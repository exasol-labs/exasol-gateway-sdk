name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to package
        required: true
        type: string

permissions:
  contents: write

jobs:
  source-release:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Select and validate tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          fi
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          git rev-parse --verify "refs/tags/$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Create reproducible source archive and checksums
        run: |
          tag="${{ steps.version.outputs.tag }}"
          prefix="exasol-gateway-sdk-${tag#v}"
          git archive --format=tar --prefix="$prefix/" "$tag" \
            | gzip -n > "$prefix.tar.gz"
          sha256sum "$prefix.tar.gz" > "$prefix.tar.gz.sha256"
          cat > "$prefix.spdx.json" <<EOF
          {
            "spdxVersion": "SPDX-2.3",
            "dataLicense": "CC0-1.0",
            "SPDXID": "SPDXRef-DOCUMENT",
            "name": "$prefix",
            "documentNamespace": "https://github.com/exasol-labs/exasol-gateway-sdk/releases/tag/$tag",
            "creationInfo": {"creators": ["Organization: Exasol Labs"], "created": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"},
            "packages": [{"name": "$prefix", "SPDXID": "SPDXRef-Package", "downloadLocation": "NOASSERTION", "licenseConcluded": "MIT", "licenseDeclared": "MIT", "filesAnalyzed": false}]
          }
          EOF
      - name: Publish GitHub release
        run: |
          tag="${{ steps.version.outputs.tag }}"
          prefix="exasol-gateway-sdk-${tag#v}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$prefix.tar.gz" "$prefix.tar.gz.sha256" "$prefix.spdx.json" --clobber
          else
            prerelease=()
            if [[ "$tag" == *-* ]]; then prerelease=(--prerelease); fi
            gh release create "$tag" "$prefix.tar.gz" "$prefix.tar.gz.sha256" "$prefix.spdx.json" \
              --verify-tag --generate-notes --title "Exasol Gateway SDK ${tag#v}" "${prerelease[@]}"
          fi
