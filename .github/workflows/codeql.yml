name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '23 4 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ca-certificates cmake libssl-dev lsb-release ninja-build wget
          wget --quiet "https://packages.apache.org/artifactory/arrow/ubuntu/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get install --yes ./apache-arrow-apt-source-latest-*.deb
          sudo apt-get update
          sudo apt-get install --yes libarrow-dev
      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=OFF -DEXASOL_GATEWAY_BUILD_EXAMPLES=ON
          cmake --build build
      - uses: github/codeql-action/analyze@v3
